services:
  nginx:
    image: nginx:1.25.1-alpine3.17
    depends_on:
    - document-server
    - redmine
    ports:
    - 8080:8080
    - 8081:8081
    volumes:
    - ./nginx.conf:/etc/nginx/nginx.conf

  document-server:
    image: onlyoffice/documentserver-de:7.5.1.1
    environment:
    - JWT_SECRET=secret

  redmine:
    image: redmine:5.0.5-alpine3.18
    volumes:
    - ./.build/onlyoffice_redmine:/usr/src/redmine/plugins/onlyoffice_redmine
    - ./config.ru:/usr/src/redmine/config.ru
    environment:
    - RAILS_RELATIVE_URL_ROOT=/
    - REDMINE_DB_PASSWORD=redmine
    - REDMINE_DB_POSTGRES=postgres
    - REDMINE_DB_USERNAME=redmine
    - REDMINE_PLUGINS_MIGRATE=true
    - REDMINE_SECRET_KEY_BASE=redmine

  postgres:
    image: postgres:15.4-alpine3.18
    environment:
    - POSTGRES_DB=redmine
    - POSTGRES_PASSWORD=redmine
    - POSTGRES_USER=redmine
